name: Update conference deadlines

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update conference data
        run: python scripts/update_conferences.py

      - name: Build site
        run: python scripts/build_site.py

      - name: Summarize changes
        run: python scripts/summarize_changes.py

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/update-conference-deadlines
          title: "Update conference deadlines"
          body-path: update-summary.md
          commit-message: "Update conference deadline data"
          delete-branch: true
